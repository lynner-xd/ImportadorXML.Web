<div class="page-header">
  <h1>Alterar Senha</h1>
  <p>Informe sua senha atual e defina uma nova senha</p>
</div>

<div class="card form-card">
  @if (success()) {
    <div class="success-msg">
      <i class="pi pi-check-circle"></i>
      Senha alterada com sucesso! Redirecionando...
    </div>
  } @else {
    <div class="form">
      <div class="field">
        <label>Senha Atual</label>
        <input type="password" [(ngModel)]="senhaAtual" placeholder="••••••••" />
      </div>
      <div class="field">
        <label>Nova Senha</label>
        <input type="password" [(ngModel)]="novaSenha" placeholder="Mínimo 6 caracteres" />
      </div>
      <div class="field">
        <label>Confirmar Nova Senha</label>
        <input type="password" [(ngModel)]="confirmarSenha" placeholder="Repita a nova senha" />
      </div>

      @if (error()) {
        <div class="error-msg"><i class="pi pi-exclamation-circle"></i> {{ error() }}</div>
      }

      <button class="btn-primary" (click)="alterar()" [disabled]="loading()">
        @if (loading()) { <i class="pi pi-spinner pi-spin"></i> Alterando... } @else { Alterar Senha }
      </button>
    </div>
  }
</div>
